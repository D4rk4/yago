name: e2e

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: yacynode/go.mod

      - name: Cache tool binaries
        uses: actions/cache@v4
        with:
          path: .toolchain/bin
          key: tools-${{ runner.os }}-${{ hashFiles('tools/tools.lock') }}

      - name: Build e2e images
        run: make e2e-images

      - name: Run e2e suites
        run: make e2e
