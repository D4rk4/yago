name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: yacynode/go.mod

      - name: Cache tool binaries
        uses: actions/cache@v4
        with:
          path: .toolchain/bin
          key: tools-${{ runner.os }}-${{ hashFiles('tools/tools.lock') }}

      - name: Run make verify
        run: make verify
