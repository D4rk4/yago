name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'v0.0.10' || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && 'refs/tags/v0.0.10' || github.ref }}
  RELEASE_TAG_OBJECT: ${{ github.event_name == 'workflow_dispatch' && '09ca7be1b1e5065155111479c9213bd0566801d8' || '' }}
  RELEASE_SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && '9bcc0bde61364c8248fba7f452c19f2446c72898' || github.sha }}
  BACKFILL_VALIDATION_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && '29520082413' || '' }}
  BACKFILL_VALIDATION_SHA: ${{ github.event_name == 'workflow_dispatch' && '0873557bc6b77f04457e9a65114154cc618c991c' || '' }}

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify release identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if test "$GITHUB_EVENT_NAME" = workflow_dispatch; then
            test "$GITHUB_REF" = refs/heads/main
            test "$GITHUB_SHA" = "$GITHUB_WORKFLOW_SHA"
            release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/355175485")
            test "$(printf '%s' "$release_json" | jq -r .id)" = 355175485
            test "$(printf '%s' "$release_json" | jq -r .tag_name)" = v0.0.10
            test "$(printf '%s' "$release_json" | jq -r .target_commitish)" = main
            test "$(printf '%s' "$release_json" | jq -r .draft)" = false
            test "$(printf '%s' "$release_json" | jq -r .prerelease)" = false
            test "$(printf '%s' "$release_json" | jq -r .published_at)" != null
            git fetch --force origin "$RELEASE_REF:$RELEASE_REF"
            test "$(git ls-remote origin "$RELEASE_REF" | awk '{print $1}')" = "$RELEASE_TAG_OBJECT"
            test "$(git cat-file -t "$RELEASE_TAG")" = tag
            test "$(git rev-parse "$RELEASE_TAG")" = "$RELEASE_TAG_OBJECT"
            test "$(git rev-parse "${RELEASE_TAG}^{}")" = "$RELEASE_SOURCE_SHA"
          else
            test "$GITHUB_REF" = "$RELEASE_REF"
            test "$GITHUB_SHA" = "$RELEASE_SOURCE_SHA"
          fi
          printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          test "$RELEASE_REF" = "refs/tags/${RELEASE_TAG}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          git merge-base --is-ancestor "$RELEASE_SOURCE_SHA" origin/main

      - name: Checkout release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_SOURCE_SHA }}
          fetch-depth: 0

      - name: Verify completed historical validation
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${BACKFILL_VALIDATION_RUN_ID}")
          test "$(printf '%s' "$run_json" | jq -r .id)" = "$BACKFILL_VALIDATION_RUN_ID"
          test "$(printf '%s' "$run_json" | jq -r .run_attempt)" = 2
          test "$(printf '%s' "$run_json" | jq -r .event)" = workflow_dispatch
          test "$(printf '%s' "$run_json" | jq -r .status)" = completed
          test "$(printf '%s' "$run_json" | jq -r .head_branch)" = main
          test "$(printf '%s' "$run_json" | jq -r .head_sha)" = "$BACKFILL_VALIDATION_SHA"
          test "$(printf '%s' "$run_json" | jq -r .path)" = .github/workflows/release.yml
          jobs_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${BACKFILL_VALIDATION_RUN_ID}/attempts/2/jobs?per_page=100")
          printf '%s' "$jobs_json" | jq -e '
            any(.jobs[];
              (.id == 87696337116) and (.name == "verify") and
              (.run_attempt == 2) and (.status == "completed") and
              (.conclusion == "success")
            ) and
            any(.jobs[];
              (.id == 87698690209) and
              (.name == "containers (amd64, ubuntu-24.04)") and
              (.run_attempt == 2) and (.status == "completed") and
              (.conclusion == "success")
            ) and
            any(.jobs[];
              (.id == 87698690511) and
              (.name == "containers (arm64, ubuntu-24.04-arm)") and
              (.run_attempt == 2) and (.status == "completed") and
              (.conclusion == "success")
            )
          '
          artifacts_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${BACKFILL_VALIDATION_RUN_ID}/artifacts?per_page=100")
          printf '%s' "$artifacts_json" | jq -e \
            --arg validation_sha "$BACKFILL_VALIDATION_SHA" '
            (.total_count == 2) and (.artifacts | length == 2) and
            any(.artifacts[];
              (.id == 8384841304) and (.name == "release-containers-amd64") and
              (.digest == "sha256:2336bc9c48e684dd44c50ffe61ca11f6fa98a02fd647e20d7ba8515b8ff8c41f") and
              (.expired == false) and (.workflow_run.id == 29520082413) and
              (.workflow_run.head_sha == $validation_sha)
            ) and
            any(.artifacts[];
              (.id == 8384836062) and (.name == "release-containers-arm64") and
              (.digest == "sha256:fe4fee5f2e5abb0fa0b281bb8530ac4b5e47ceba36063366c3fcc6440be7c201") and
              (.expired == false) and (.workflow_run.id == 29520082413) and
              (.workflow_run.head_sha == $validation_sha)
            )
          '

      - name: Verify human-authored release notes
        run: |
          notes="doc/releases/${RELEASE_TAG}.md"
          test -f "$notes"
          test "$(grep -c '^<!--more-->$' "$notes")" -eq 1
          test "$(sed -n '1p' "$notes")" = '## Abstract'
          abstract_words=$(awk '
            /^<!--more-->$/ { print words; found = 1; exit }
            NR > 1 { words += NF }
            END { if (!found) exit 1 }
          ' "$notes")
          test "$abstract_words" -ge 1
          test "$abstract_words" -le 120
          grep '^## ' "$notes" > /tmp/release-headings
          diff -u - /tmp/release-headings <<'EOF'
          ## Abstract
          ## Release identity
          ## Changes
          ## Compatibility
          ## Upgrade and rollback
          ## Verification
          ## Known limitations
          EOF

      - name: Set up Go
        if: github.event_name == 'push'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: yagonode/go.mod

      - name: Cache Go modules and tools
        if: github.event_name == 'push'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            tools/bin
          key: release-verify-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Verify
        if: github.event_name == 'push'
        run: make verify

  build:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: yagonode/go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME}"
          node_pkg="github.com/D4rk4/yago/yagonode/internal/yagonode"
          mkdir -p dist/${GOARCH}
          go build -trimpath -ldflags="-s -w -X ${node_pkg}.buildVersion=${version}" \
            -o dist/${GOARCH}/yago-node ./yagonode/cmd/yago-node
          (cd yagocrawler && go build -trimpath -ldflags="-s -w -X main.version=${version}" \
            -o ../dist/${GOARCH}/yagocrawler ./cmd/yagocrawler)

      - name: Package tarball
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          tar -czf "dist/yago_${package_version}_linux_${{ matrix.goarch }}.tar.gz" \
            -C dist/${{ matrix.goarch }} yago-node yagocrawler \
            -C ../.. deploy/install.sh deploy/systemd doc/backup-restore.md

      - name: Build .deb
        run: |
          version="${GITHUB_REF_NAME#v}"
          sh deploy/debian/build-deb.sh "$version" ${{ matrix.goarch }} \
            dist/${{ matrix.goarch }} dist

      - name: Smoke-test .deb across target distros (amd64)
        if: matrix.goarch == 'amd64'
        run: |
          version="${GITHUB_REF_NAME#v}"
          deb="/out/yago_${version}_amd64.deb"
          for img in debian:12 debian:13 ubuntu:24.04 ubuntu:latest; do
            echo "::group::smoke ${img}"
            docker run --rm -e DEBIAN_FRONTEND=noninteractive \
              -v "$PWD/dist:/out:ro" "$img" sh -eu -c '
                apt-get update -qq >/dev/null
                apt-get install -y -qq --no-install-recommends "$1" >/dev/null
                id yago
                test "$(dpkg-query -W -f="\${Version}" yago)" = "$2"
                dpkg-query -W -f="\${Depends}" yago | grep -q ca-certificates
                dpkg-query -W -f="\${Recommends}" yago | grep -q firefox
                test "$(/opt/yago/bin/yago-node --version)" = "yago-node v$2"
                test "$(/opt/yago/bin/yagocrawler --version)" = "yago-crawler v$2"
                dpkg -P yago >/dev/null
                test -d /opt/yago/data
                echo "  OK ${1##*/}"
              ' sh "$deb" "$version"
            echo "::endgroup::"
          done

      - name: Install rpm tooling
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build .rpm
        run: |
          version="${GITHUB_REF_NAME#v}"
          sh deploy/rpm/build-rpm.sh "$version" ${{ matrix.goarch }} \
            dist/${{ matrix.goarch }} dist

      - name: Smoke-test .rpm across RPM distros (amd64)
        if: matrix.goarch == 'amd64'
        run: |
          version="${GITHUB_REF_NAME#v}"
          rpm_path="/out/yago-${version}-1.x86_64.rpm"
          for img in fedora:latest rockylinux:9; do
            echo "::group::smoke ${img}"
            docker run --rm -v "$PWD/dist:/out:ro" "$img" sh -eu -c '
                dnf install -y -q --setopt=install_weak_deps=False "$1" >/dev/null
                id yago
                test "$(rpm -q --qf "%{VERSION}" yago)" = "$2"
                rpm -q --requires yago | grep -q ca-certificates
                rpm -q --recommends yago | grep -q firefox
                test "$(/opt/yago/bin/yago-node --version)" = "yago-node v$2"
                test "$(/opt/yago/bin/yagocrawler --version)" = "yago-crawler v$2"
                rpm -e yago
                test -d /opt/yago/data
                echo "  OK ${1##*/}"
              ' sh "$rpm_path" "$version"
            echo "::endgroup::"
          done

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

  containers:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            runner: ubuntu-24.04
          - architecture: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_SOURCE_SHA }}

      - name: Build, smoke-test, and scan release containers
        run: sh deploy/verify-release-containers.sh "$RELEASE_TAG" "$RELEASE_SOURCE_SHA" "${{ matrix.architecture }}"

      - name: Checkout release workflow tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.workflow_sha }}
          path: .release-workflow

      - name: Export validated release containers
        run: sh .release-workflow/deploy/export-release-containers.sh "$RELEASE_TAG" "$RELEASE_SOURCE_SHA" "${{ matrix.architecture }}" container-dist

      - name: Upload validated release containers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-containers-${{ matrix.architecture }}
          path: container-dist/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  container_publish:
    needs: [verify, build, containers]
    if: ${{ always() && !cancelled() && needs.verify.result == 'success' && ((github.event_name == 'push' && needs.build.result == 'success' && needs.containers.result == 'success') || (github.event_name == 'workflow_dispatch' && needs.build.result == 'skipped' && needs.containers.result == 'skipped')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    concurrency:
      group: release-container-publish-${{ github.event_name == 'workflow_dispatch' && 'refs/tags/v0.0.10' || github.ref }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release workflow tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.workflow_sha }}
          path: release-workflow
          fetch-depth: 0

      - name: Download validated release containers
        if: github.event_name == 'push'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-containers-*
          path: container-dist
          merge-multiple: true

      - name: Download validated historical release containers
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: 8384841304,8384836062
          path: container-dist
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29520082413

      - name: Reverify historical release identity before publication
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_SHA" = "$GITHUB_WORKFLOW_SHA"
          release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/355175485")
          test "$(printf '%s' "$release_json" | jq -r .id)" = 355175485
          test "$(printf '%s' "$release_json" | jq -r .tag_name)" = "$RELEASE_TAG"
          test "$(printf '%s' "$release_json" | jq -r .target_commitish)" = main
          test "$(printf '%s' "$release_json" | jq -r .draft)" = false
          test "$(printf '%s' "$release_json" | jq -r .prerelease)" = false
          test "$(printf '%s' "$release_json" | jq -r .published_at)" != null
          tag_json=$(gh api "/repos/${GITHUB_REPOSITORY}/git/tags/${RELEASE_TAG_OBJECT}")
          test "$(printf '%s' "$tag_json" | jq -r .tag)" = "$RELEASE_TAG"
          test "$(printf '%s' "$tag_json" | jq -r .object.type)" = commit
          test "$(printf '%s' "$tag_json" | jq -r .object.sha)" = "$RELEASE_SOURCE_SHA"
          test "$(git -C release-workflow ls-remote origin "$RELEASE_REF" | awk '{print $1}')" = "$RELEASE_TAG_OBJECT"
          git -C release-workflow fetch --no-tags origin main:refs/remotes/origin/main
          git -C release-workflow merge-base --is-ancestor "$GITHUB_SHA" origin/main
          git -C release-workflow merge-base --is-ancestor "$RELEASE_SOURCE_SHA" origin/main

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Publish multi-architecture release containers
        id: publish
        run: sh release-workflow/deploy/publish-release-containers.sh "$RELEASE_TAG" "$RELEASE_SOURCE_SHA" container-dist >> "$GITHUB_OUTPUT"

      - name: Verify historical manifest identities
        if: github.event_name == 'workflow_dispatch'
        env:
          NODE_DIGEST: ${{ steps.publish.outputs.node_digest }}
          NODE_AMD64_DIGEST: ${{ steps.publish.outputs.node_amd64_digest }}
          NODE_ARM64_DIGEST: ${{ steps.publish.outputs.node_arm64_digest }}
          CRAWLER_DIGEST: ${{ steps.publish.outputs.crawler_digest }}
          CRAWLER_AMD64_DIGEST: ${{ steps.publish.outputs.crawler_amd64_digest }}
          CRAWLER_ARM64_DIGEST: ${{ steps.publish.outputs.crawler_arm64_digest }}
        run: |
          test "$NODE_DIGEST" = sha256:b50c94fb17c498bbb185785efac9e03e9505384f7abb95ab8555f16a62d9f445
          test "$NODE_AMD64_DIGEST" = sha256:ff5472dc9a2e9c936ee528ea7d3f743d811e66c8325b92f5935347f5306fe51c
          test "$NODE_ARM64_DIGEST" = sha256:c3e8a2553456da6b1788b344d5f48660ae51d7d9b35166f18fbd815423ed1669
          test "$CRAWLER_DIGEST" = sha256:82fc9336f3b7e2bf662ad978451df0410de08c64819ec6281d724580e58165cd
          test "$CRAWLER_AMD64_DIGEST" = sha256:cb0c8f216e4773d87da79a0e75885233a88abcc917c93a0d38064d9895d10802
          test "$CRAWLER_ARM64_DIGEST" = sha256:f5608032651e8e71e3979b4710822f8717afd6c6b823441200557a872477cfa4

      - name: Record historical release container identity
        if: github.event_name == 'workflow_dispatch'
        env:
          NODE_DIGEST: ${{ steps.publish.outputs.node_digest }}
          CRAWLER_DIGEST: ${{ steps.publish.outputs.crawler_digest }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          jq -n \
            --arg release_tag "$RELEASE_TAG" \
            --arg release_ref "$RELEASE_REF" \
            --arg release_tag_object "$RELEASE_TAG_OBJECT" \
            --arg release_source "$RELEASE_SOURCE_SHA" \
            --arg workflow_ref "$GITHUB_WORKFLOW_REF" \
            --arg workflow_sha "$WORKFLOW_SHA" \
            --arg source_ref "$GITHUB_REF" \
            --arg source_sha "$GITHUB_SHA" \
            --arg validation_sha "$BACKFILL_VALIDATION_SHA" \
            --arg node_digest "$NODE_DIGEST" \
            --arg crawler_digest "$CRAWLER_DIGEST" \
            '{
              schemaVersion: 1,
              release: {
                id: 355175485,
                tag: $release_tag,
                ref: $release_ref,
                tagObject: $release_tag_object,
                sourceCommit: $release_source
              },
              workflow: {
                event: "workflow_dispatch",
                ref: $source_ref,
                sourceDigest: $source_sha,
                definitionRef: $workflow_ref,
                definitionDigest: $workflow_sha
              },
              validation: {
                runId: 29520082413,
                attempt: 2,
                definitionDigest: $validation_sha,
                artifacts: [
                  {
                    id: 8384841304,
                    name: "release-containers-amd64",
                    digest: "sha256:2336bc9c48e684dd44c50ffe61ca11f6fa98a02fd647e20d7ba8515b8ff8c41f"
                  },
                  {
                    id: 8384836062,
                    name: "release-containers-arm64",
                    digest: "sha256:fe4fee5f2e5abb0fa0b281bb8530ac4b5e47ceba36063366c3fcc6440be7c201"
                  }
                ]
              },
              manifests: {
                node: $node_digest,
                crawler: $crawler_digest
              }
            }' > "$RUNNER_TEMP/historical-release-container-identity.json"

      - name: Attest node container manifest
        if: github.event_name == 'push'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yago-node
          subject-digest: ${{ steps.publish.outputs.node_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest crawler container manifest
        if: github.event_name == 'push'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yagocrawler
          subject-digest: ${{ steps.publish.outputs.crawler_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest historical node container provenance
        if: github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yago-node
          subject-digest: ${{ steps.publish.outputs.node_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest historical crawler container provenance
        if: github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yagocrawler
          subject-digest: ${{ steps.publish.outputs.crawler_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest historical node container identity
        if: github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yago-node
          subject-digest: ${{ steps.publish.outputs.node_digest }}
          predicate-type: https://github.com/D4rk4/yago/blob/${{ github.workflow_sha }}/doc/release-container-identity-v1.md
          predicate-path: ${{ runner.temp }}/historical-release-container-identity.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest historical crawler container identity
        if: github.event_name == 'workflow_dispatch'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/d4rk4/yagocrawler
          subject-digest: ${{ steps.publish.outputs.crawler_digest }}
          predicate-type: https://github.com/D4rk4/yago/blob/${{ github.workflow_sha }}/doc/release-container-identity-v1.md
          predicate-path: ${{ runner.temp }}/historical-release-container-identity.json
          push-to-registry: true
          create-storage-record: false

      - name: Verify container manifest attestations
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_DIGEST: ${{ steps.publish.outputs.node_digest }}
          CRAWLER_DIGEST: ${{ steps.publish.outputs.crawler_digest }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          for subject in \
            "oci://ghcr.io/d4rk4/yago-node@${NODE_DIGEST}" \
            "oci://ghcr.io/d4rk4/yagocrawler@${CRAWLER_DIGEST}"; do
            gh attestation verify "$subject" \
              --bundle-from-oci \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$WORKFLOW_SHA" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners
          done

      - name: Verify historical container manifest attestations
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_DIGEST: ${{ steps.publish.outputs.node_digest }}
          CRAWLER_DIGEST: ${{ steps.publish.outputs.crawler_digest }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          build_type="https://actions.github.io/buildtypes/workflow/v1"
          identity_type="https://github.com/${GITHUB_REPOSITORY}/blob/${WORKFLOW_SHA}/doc/release-container-identity-v1.md"
          builder="https://github.com/${GITHUB_WORKFLOW_REF}"
          invocation="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
          verify_historical_attestations() {
            subject_name="$1"
            subject_digest="$2"
            subject_sha="${subject_digest#sha256:}"
            provenance_file="$RUNNER_TEMP/$(basename "$subject_name")-historical-provenance.json"
            identity_file="$RUNNER_TEMP/$(basename "$subject_name")-historical-identity.json"
            gh attestation verify "oci://${subject_name}@${subject_digest}" \
              --bundle-from-oci \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$WORKFLOW_SHA" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --predicate-type https://slsa.dev/provenance/v1 \
              --deny-self-hosted-runners \
              --format json > "$provenance_file"
            jq -e \
              --arg subject_name "$subject_name" \
              --arg subject_sha "$subject_sha" \
              --arg build_type "$build_type" \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg source_ref "$GITHUB_REF" \
              --arg source_sha "$GITHUB_SHA" \
              --arg builder "$builder" \
              --arg invocation "$invocation" \
              'any(.[];
                .verificationResult.statement as $statement |
                ($statement.predicateType == "https://slsa.dev/provenance/v1") and
                any($statement.subject[];
                  (.name == $subject_name) and (.digest.sha256 == $subject_sha)
                ) and
                ($statement.predicate.buildDefinition.buildType == $build_type) and
                ($statement.predicate.buildDefinition.externalParameters.workflow == {
                  ref: $source_ref,
                  repository: ("https://github.com/" + $repository),
                  path: ".github/workflows/release.yml"
                }) and
                ($statement.predicate.buildDefinition.internalParameters.github == {
                  event_name: "workflow_dispatch",
                  repository_id: "1285911508",
                  repository_owner_id: "1151390",
                  runner_environment: "github-hosted"
                }) and
                any($statement.predicate.buildDefinition.resolvedDependencies[];
                  (.uri == ("git+https://github.com/" + $repository + "@" + $source_ref)) and
                  (.digest.gitCommit == $source_sha)
                ) and
                ($statement.predicate.runDetails.builder.id == $builder) and
                ($statement.predicate.runDetails.metadata.invocationId == $invocation)
              )' "$provenance_file"
            gh attestation verify "oci://${subject_name}@${subject_digest}" \
              --bundle-from-oci \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$WORKFLOW_SHA" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --predicate-type "$identity_type" \
              --deny-self-hosted-runners \
              --format json > "$identity_file"
            jq -e \
              --arg subject_name "$subject_name" \
              --arg subject_sha "$subject_sha" \
              --arg identity_type "$identity_type" \
              --arg release_tag "$RELEASE_TAG" \
              --arg release_ref "$RELEASE_REF" \
              --arg release_tag_object "$RELEASE_TAG_OBJECT" \
              --arg release_source "$RELEASE_SOURCE_SHA" \
              --arg workflow_ref "$GITHUB_WORKFLOW_REF" \
              --arg workflow_sha "$WORKFLOW_SHA" \
              --arg source_ref "$GITHUB_REF" \
              --arg source_sha "$GITHUB_SHA" \
              --arg validation_sha "$BACKFILL_VALIDATION_SHA" \
              --arg node_digest "$NODE_DIGEST" \
              --arg crawler_digest "$CRAWLER_DIGEST" \
              'any(.[];
                .verificationResult.statement as $statement |
                ($statement.predicateType == $identity_type) and
                any($statement.subject[];
                  (.name == $subject_name) and (.digest.sha256 == $subject_sha)
                ) and
                ($statement.predicate == {
                  schemaVersion: 1,
                  release: {
                    id: 355175485,
                    tag: $release_tag,
                    ref: $release_ref,
                    tagObject: $release_tag_object,
                    sourceCommit: $release_source
                  },
                  workflow: {
                    event: "workflow_dispatch",
                    ref: $source_ref,
                    sourceDigest: $source_sha,
                    definitionRef: $workflow_ref,
                    definitionDigest: $workflow_sha
                  },
                  validation: {
                    runId: 29520082413,
                    attempt: 2,
                    definitionDigest: $validation_sha,
                    artifacts: [
                      {
                        id: 8384841304,
                        name: "release-containers-amd64",
                        digest: "sha256:2336bc9c48e684dd44c50ffe61ca11f6fa98a02fd647e20d7ba8515b8ff8c41f"
                      },
                      {
                        id: 8384836062,
                        name: "release-containers-arm64",
                        digest: "sha256:fe4fee5f2e5abb0fa0b281bb8530ac4b5e47ceba36063366c3fcc6440be7c201"
                      }
                    ]
                  },
                  manifests: {
                    node: $node_digest,
                    crawler: $crawler_digest
                  }
                })
              )' "$identity_file"
          }
          verify_historical_attestations ghcr.io/d4rk4/yago-node "$NODE_DIGEST"
          verify_historical_attestations ghcr.io/d4rk4/yagocrawler "$CRAWLER_DIGEST"

      - name: Verify public release containers without credentials
        env:
          NODE_DIGEST: ${{ steps.publish.outputs.node_digest }}
          CRAWLER_DIGEST: ${{ steps.publish.outputs.crawler_digest }}
        run: sh release-workflow/deploy/verify-public-release-containers.sh "$RELEASE_TAG" "$RELEASE_SOURCE_SHA" "$NODE_DIGEST" "$CRAWLER_DIGEST"

  release:
    needs: [build, container_publish]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in dist/*; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file "doc/releases/${GITHUB_REF_NAME}.md"
