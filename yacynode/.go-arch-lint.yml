    in: go.etcd.io/bbolt
  bleve:
    in:
      - github.com/blevesearch/bleve/v2
      - github.com/blevesearch/bleve/v2/**
  prometheus:
    in:
      - github.com/prometheus/client_golang/prometheus
      - github.com/prometheus/client_golang/prometheus/**
  grpc:
    in:
      - google.golang.org/grpc
      - google.golang.org/grpc/**
  protobuf:
    in:
      - google.golang.org/protobuf
      - google.golang.org/protobuf/**
  crypto:
    in:
      - golang.org/x/crypto
      - golang.org/x/crypto/**

