version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  crawljob:
    in: internal/crawljob/**
  weburl:
    in: internal/weburl/**
  crawlrun:
    in: internal/crawlrun/**
  sitemap:
    in: internal/sitemap/**
  crawlseed:
    in: internal/crawlseed/**
  boundedqueue:
    in: internal/boundedqueue/**
  pagefetch:
    in: internal/pagefetch/**
  httpfetch:
    in: internal/httpfetch/**
  chromedpfetch:
    in: internal/chromedpfetch/**
  botwall:
    in: internal/botwall/**
  publicweb:
    in: internal/publicweb/**
  robots:
    in: internal/robots/**
  crawldelay:
    in: internal/crawldelay/**
  crawlorder:
    in: internal/crawlorder/**
  crawladmission:
    in: internal/crawladmission/**
  frontier:
    in: internal/frontier/**
  pageparse:
    in: internal/pageparse/**
  pageindex:
    in: internal/pageindex/**
  ingest:
    in: internal/ingest/**
  pipeline:
    in: internal/pipeline/**
  crawlermetrics:
    in: internal/crawlermetrics/**
  crawlercmd:
    in: cmd/yagocrawler/**

vendors:
  yagomodel:
    in:
      - github.com/D4rk4/yago/yagomodel
      - github.com/D4rk4/yago/yagomodel/**
  yagocrawlcontract:
    in:
      - github.com/D4rk4/yago/yagocrawlcontract
      - github.com/D4rk4/yago/yagocrawlcontract/**
  yagoegress:
    in:
      - github.com/D4rk4/yago/yagoegress
      - github.com/D4rk4/yago/yagoegress/**
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  golang-lru:
    in: github.com/hashicorp/golang-lru/v2
  singleflight:
    in: golang.org/x/sync/singleflight
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp
  go-shiori-dom:
    in: github.com/go-shiori/dom
  google-uuid:
    in: github.com/google/uuid
  grpc:
    in:
      - google.golang.org/grpc
      - google.golang.org/grpc/**
  protobuf:
    in:
      - google.golang.org/protobuf
      - google.golang.org/protobuf/**
  prometheus:
    in:
      - github.com/prometheus/client_golang/prometheus
      - github.com/prometheus/client_golang/prometheus/**

deps:
  crawljob:
    mayDependOn:
      - crawljob
    canUse:
      - google-uuid
  weburl:
    mayDependOn:
      - weburl
  crawlrun:
    mayDependOn:
      - crawlrun
    canUse:
      - google-uuid
  sitemap:
    mayDependOn:
      - sitemap
  crawlseed:
    mayDependOn:
      - crawlseed
      - pagefetch
      - sitemap
      - weburl
    canUse:
      - yagocrawlcontract
  boundedqueue:
    mayDependOn:
      - boundedqueue
  pagefetch:
    mayDependOn:
      - pagefetch
  httpfetch:
    mayDependOn:
      - httpfetch
      - pagefetch
  chromedpfetch:
    mayDependOn:
      - pagefetch
    canUse:
      - chromedp
      - yagoegress
  botwall:
    mayDependOn:
      - botwall
      - pagefetch
  publicweb:
    mayDependOn:
      - publicweb
      - pagefetch
    canUse:
      - yagoegress
  robots:
    mayDependOn:
      - robots
      - pagefetch
    canUse:
      - robotstxt
      - golang-lru
      - singleflight
  crawldelay:
    mayDependOn:
      - crawldelay
      - crawljob
      - weburl
    canUse:
      - golang-lru
  crawladmission:
    mayDependOn:
      - crawladmission
      - weburl
    canUse:
      - yagocrawlcontract
  frontier:
    mayDependOn:
      - frontier
      - crawladmission
      - crawljob
      - crawlrun
      - weburl
    canUse:
      - yagocrawlcontract
      - google-uuid
  pageparse:
    mayDependOn:
      - pageparse
      - weburl
    canUse:
      - xnet-html
      - trafilatura
      - go-shiori-dom
  pageindex:
    mayDependOn:
      - pageindex
      - pageparse
    canUse:
      - yagocrawlcontract
      - yagomodel
  ingest:
    mayDependOn:
      - ingest
      - boundedqueue
    canUse:
      - yagocrawlcontract
      - yagomodel
      - grpc
      - protobuf
  crawlorder:
    mayDependOn:
      - crawlorder
      - boundedqueue
      - crawladmission
      - frontier
    canUse:
      - yagocrawlcontract
      - grpc
      - protobuf
  pipeline:
    mayDependOn:
      - pipeline
      - crawljob
      - ingest
      - pagefetch
      - pageindex
      - pageparse
      - weburl
    canUse:
      - yagocrawlcontract
      - yagomodel
  crawlermetrics:
    mayDependOn:
      - crawlermetrics
    canUse:
      - prometheus
  crawlercmd:
    mayDependOn:
      - botwall
      - chromedpfetch
      - crawldelay
      - crawlermetrics
      - crawlorder
      - crawlseed
      - frontier
      - httpfetch
      - ingest
      - pagefetch
      - pageindex
      - pipeline
      - publicweb
      - robots
    canUse:
      - yagocrawlcontract
      - yagoegress
      - grpc
      - protobuf

excludeFiles:
  - "test/e2e"
