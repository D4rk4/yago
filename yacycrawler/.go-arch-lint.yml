version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  crawljob:
    in: internal/crawljob/**
  weburl:
    in: internal/weburl/**
  crawlrun:
    in: internal/crawlrun/**
  boundedqueue:
    in: internal/boundedqueue/**
  pagefetch:
    in: internal/pagefetch/**
  chromedpfetch:
    in: internal/chromedpfetch/**
  botwall:
    in: internal/botwall/**
  robots:
    in: internal/robots/**
  crawldelay:
    in: internal/crawldelay/**
  crawlorder:
    in: internal/crawlorder/**
  crawladmission:
    in: internal/crawladmission/**
  frontier:
    in: internal/frontier/**
  pageparse:
    in: internal/pageparse/**
  pageindex:
    in: internal/pageindex/**
  crawledpageindex:
    in: internal/crawledpageindex/**
  docidentity:
    in: internal/docidentity/**
  crawledpage:
    in: internal/crawledpage/**
  pipeline:
    in: internal/pipeline/**
  crawlercmd:
    in: cmd/yacycrawler/**

vendors:
  yacymodel:
    in:
      - github.com/nikitakarpei/yacy-rwi-node/yacymodel
      - github.com/nikitakarpei/yacy-rwi-node/yacymodel/**
  yacycrawlcontract:
    in:
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract/**
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  golang-lru:
    in: github.com/hashicorp/golang-lru/v2
  singleflight:
    in: golang.org/x/sync/singleflight
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp
  go-shiori-dom:
    in: github.com/go-shiori/dom
  google-uuid:
    in: github.com/google/uuid
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  crawljob:
    mayDependOn:
      - crawljob
    canUse:
      - google-uuid
  weburl:
    mayDependOn:
      - weburl
  crawlrun:
    mayDependOn:
      - crawlrun
    canUse:
      - google-uuid
  boundedqueue:
    mayDependOn:
      - boundedqueue
  pagefetch:
    mayDependOn:
      - pagefetch
  chromedpfetch:
    mayDependOn:
      - pagefetch
    canUse:
      - chromedp
  botwall:
    mayDependOn:
      - botwall
      - pagefetch
  robots:
    mayDependOn:
      - robots
      - pagefetch
    canUse:
      - robotstxt
      - golang-lru
      - singleflight
  crawldelay:
    mayDependOn:
      - crawldelay
      - crawljob
      - weburl
    canUse:
      - golang-lru
  crawladmission:
    mayDependOn:
      - crawladmission
      - weburl
    canUse:
      - yacycrawlcontract
  frontier:
    mayDependOn:
      - frontier
      - crawladmission
      - crawljob
      - crawlrun
      - weburl
    canUse:
      - yacycrawlcontract
      - google-uuid
  pageparse:
    mayDependOn:
      - pageparse
      - weburl
    canUse:
      - xnet-html
      - trafilatura
      - go-shiori-dom
  pageindex:
    mayDependOn:
      - pageindex
      - pageparse
    canUse:
      - yacymodel
  crawledpageindex:
    mayDependOn:
      - crawledpageindex
      - boundedqueue
    canUse:
      - yacycrawlcontract
      - yacymodel
      - nats
      - nats-server
  crawlorder:
    mayDependOn:
      - crawlorder
      - boundedqueue
      - crawladmission
      - frontier
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server
  docidentity:
    mayDependOn:
      - docidentity
  crawledpage:
    mayDependOn:
      - crawledpage
      - docidentity
      - pageparse
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server
  pipeline:
    mayDependOn:
      - pipeline
      - crawljob
      - crawledpageindex
      - crawledpage
      - pagefetch
      - pageindex
      - pageparse
      - weburl
    canUse:
      - yacymodel
  crawlercmd:
    mayDependOn:
      - botwall
      - chromedpfetch
      - crawldelay
      - crawlorder
      - frontier
      - crawledpageindex
      - crawledpage
      - pagefetch
      - pageindex
      - pipeline
      - robots
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server

excludeFiles:
  - "test/e2e"
