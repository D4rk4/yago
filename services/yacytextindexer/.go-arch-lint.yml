version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  crawledpagedocument:
    in: internal/crawledpagedocument/**
  elasticsearchindex:
    in: internal/elasticsearchindex/**
  manticoreindex:
    in: internal/manticoreindex/**
  pageintake:
    in: internal/pageintake/**
  textindexercmd:
    in: cmd/yacytextindexer/**

vendors:
  yacycrawlcontract:
    in:
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract/**
  searchdocument:
    in:
      - github.com/nikitakarpei/yacy-rwi-node/searchdocument
      - github.com/nikitakarpei/yacy-rwi-node/searchdocument/**
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  crawledpagedocument:
    mayDependOn:
      - crawledpagedocument
    canUse:
      - yacycrawlcontract
      - searchdocument
  elasticsearchindex:
    mayDependOn:
      - elasticsearchindex
      - crawledpagedocument
    canUse:
      - yacycrawlcontract
      - searchdocument
  manticoreindex:
    mayDependOn:
      - manticoreindex
      - crawledpagedocument
    canUse:
      - yacycrawlcontract
      - searchdocument
  pageintake:
    mayDependOn:
      - pageintake
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server
  textindexercmd:
    mayDependOn:
      - pageintake
      - elasticsearchindex
      - manticoreindex
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server

excludeFiles:
  - "test/e2e"
