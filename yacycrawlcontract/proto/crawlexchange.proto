syntax = "proto3";

package yacycrawl.v1;

option go_package = "github.com/D4rk4/yago/yacycrawlcontract/crawlrpc";

// CrawlExchange is the node<->crawler control plane. The node is the server and
// owns a durable order queue; crawlers are clients that stream claimed orders
// and submit ingest batches back. Payloads carry the JSON encodings produced by
// the contract's MarshalCrawlOrder and MarshalIngestBatch codecs, so the wire
// service is stable while the crawl data model stays authoritative in Go.
service CrawlExchange {
  // StreamOrders delivers claimed crawl orders to one crawler as they become
  // available. Each queued order is claimed by exactly one worker; the node
  // holds an order in its durable queue until it is written to a worker stream.
  rpc StreamOrders(WorkerRegistration) returns (stream CrawlOrderMessage);

  // SubmitIngest hands one ingest batch to the node and blocks until the node
  // absorbs it. The node returns an error when its ingest pipeline is saturated
  // so the crawler retries, which is the backpressure signal.
  rpc SubmitIngest(IngestBatchMessage) returns (IngestAck);
}

message WorkerRegistration {
  string worker_id = 1;
}

message CrawlOrderMessage {
  bytes order_json = 1;
}

message IngestBatchMessage {
  bytes batch_json = 1;
}

message IngestAck {}
