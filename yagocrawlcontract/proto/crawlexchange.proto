syntax = "proto3";

package yacycrawl.v1;

option go_package = "github.com/D4rk4/yago/yagocrawlcontract/crawlrpc";

// CrawlExchange is the node<->crawler control plane. The node is the server and
// owns a durable order queue; crawlers are clients that stream claimed orders
// and submit ingest batches back. Payloads carry the JSON encodings produced by
// the contract's MarshalCrawlOrder and MarshalIngestBatch codecs, so the wire
// service is stable while the crawl data model stays authoritative in Go.
service CrawlExchange {
  // StreamOrders delivers claimed crawl orders to one crawler as they become
  // available. Each order is leased to the receiving worker: the node holds it
  // in a durable leased state, tagged with a lease id, until the worker acks it
  // or the lease expires, at which point it is redelivered.
  rpc StreamOrders(WorkerRegistration) returns (stream CrawlOrderMessage);

  // AckOrder settles a leased order: a plain ack deletes it, and an ack with
  // requeue returns it to the pending queue for another worker.
  rpc AckOrder(OrderAck) returns (OrderAckResult);

  // Heartbeat extends the lease deadline on every order currently leased to the
  // worker, so a live worker keeps its in-flight orders from being redelivered.
  rpc Heartbeat(WorkerHeartbeat) returns (WorkerHeartbeatResult);

  // SubmitIngest hands one ingest batch to the node and blocks until the node
  // absorbs it. The node returns an error when its ingest pipeline is saturated
  // so the crawler retries, which is the backpressure signal.
  rpc SubmitIngest(IngestBatchMessage) returns (IngestAck);

  // ReportProgress lets a worker report the lifecycle and cumulative outcome
  // tallies of a run it is executing, keyed by the order provenance token, so the
  // node can surface active crawls, their counters, and their results without
  // owning the worker's in-memory frontier. Reports carry absolute tallies, so a
  // lost report is corrected by the next one.
  rpc ReportProgress(CrawlProgressReport) returns (CrawlProgressAck);
}

message WorkerRegistration {
  string worker_id = 1;
}

message CrawlOrderMessage {
  bytes order_json = 1;
  string lease_id = 2;
}

message OrderAck {
  string lease_id = 1;
  bool requeue = 2;
}

message OrderAckResult {}

message WorkerHeartbeat {
  string worker_id = 1;
}

// CrawlControlKind is a directive the node pushes to a worker to steer a run it is
// executing: pause and resume gate fetching, cancel drains the run, and set_rate
// caps the fetch pace.
enum CrawlControlKind {
  CRAWL_CONTROL_KIND_UNSPECIFIED = 0;
  CRAWL_CONTROL_KIND_PAUSE = 1;
  CRAWL_CONTROL_KIND_RESUME = 2;
  CRAWL_CONTROL_KIND_CANCEL = 3;
  CRAWL_CONTROL_KIND_SET_RATE = 4;
  // RESTART asks the whole worker to shut down gracefully so its supervisor
  // brings it back up; run_id is ignored.
  CRAWL_CONTROL_KIND_RESTART = 5;
}

// CrawlControlDirective steers one run identified by its provenance token, or the
// whole worker when run_id is empty. pages_per_minute carries the cap for
// set_rate directives and is ignored otherwise.
message CrawlControlDirective {
  CrawlControlKind kind = 1;
  bytes run_id = 2;
  uint32 pages_per_minute = 3;
}

// WorkerHeartbeatResult returns any control directives the node has queued for the
// worker since its last heartbeat, so control rides the existing lease-keepalive
// without a new stream.
message WorkerHeartbeatResult {
  repeated CrawlControlDirective directives = 1;
}

message IngestBatchMessage {
  bytes batch_json = 1;
}

message IngestAck {}

enum CrawlRunState {
  CRAWL_RUN_STATE_UNSPECIFIED = 0;
  CRAWL_RUN_STATE_RUNNING = 1;
  CRAWL_RUN_STATE_FINISHED = 2;
  CRAWL_RUN_STATE_CANCELLED = 3;
}

message CrawlRunTally {
  uint64 fetched = 1;
  uint64 indexed = 2;
  uint64 failed = 3;
  uint64 robots_denied = 4;
  uint64 duplicates = 5;
  uint64 pending = 6;
}

message CrawlProgressReport {
  string worker_id = 1;
  bytes run_id = 2;
  string profile_handle = 3;
  string profile_name = 4;
  CrawlRunState state = 5;
  CrawlRunTally tally = 6;
  optional uint32 pages_per_minute = 7;
}

message CrawlProgressAck {}
