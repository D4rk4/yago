version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  searchdocument:
    in: internal/searchdocument/**
  elasticsearchindex:
    in: internal/elasticsearchindex/**
  pageintake:
    in: internal/pageintake/**
  textindexercmd:
    in: cmd/yacytextindexer/**

vendors:
  yacycrawlcontract:
    in:
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract
      - github.com/nikitakarpei/yacy-rwi-node/yacycrawlcontract/**
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  searchdocument:
    mayDependOn:
      - searchdocument
    canUse:
      - yacycrawlcontract
  elasticsearchindex:
    mayDependOn:
      - elasticsearchindex
      - searchdocument
    canUse:
      - yacycrawlcontract
  pageintake:
    mayDependOn:
      - pageintake
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server
  textindexercmd:
    mayDependOn:
      - pageintake
      - elasticsearchindex
    canUse:
      - yacycrawlcontract
      - nats
      - nats-server

excludeFiles:
  - "test/e2e"
