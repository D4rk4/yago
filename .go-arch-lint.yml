version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  yacymodel:
    in: yacymodel/**
  yacyproto:
    in: yacyproto/**
  boltvault:
    in: yacynode/internal/boltvault/**
  httpguard:
    in: yacynode/internal/httpguard/**
  peering:
    in: yacynode/internal/peering/**
  bootstrap:
    in: yacynode/internal/bootstrap/**
  landing:
    in: yacynode/internal/landing/**
  crawling:
    in: yacynode/internal/crawling/**
  urlmeta:
    in: yacynode/internal/urlmeta/**
  rwi:
    in: yacynode/internal/rwi/**
  search:
    in: yacynode/internal/search/**
  nodestatus:
    in: yacynode/internal/nodestatus/**
  eviction:
    in: yacynode/internal/eviction/**
  cmd:
    in: yacynode/cmd/**
  yacycrawlcontract:
    in: yacycrawlcontract/**
  yacycrawler:
    in: yacycrawler/**

vendors:
  bbolt:
    in: go.etcd.io/bbolt
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  xtime-rate:
    in: golang.org/x/time/rate
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp
  go-shiori-dom:
    in: github.com/go-shiori/dom
  google-uuid:
    in: github.com/google/uuid
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  yacymodel:
    mayDependOn:
      - yacymodel
  yacyproto:
    mayDependOn:
      - yacyproto
      - yacymodel
  boltvault:
    deepScan: false
    mayDependOn:
      - boltvault
    canUse:
      - bbolt
  httpguard:
    mayDependOn:
      - httpguard
      - yacymodel
      - yacyproto
  peering:
    mayDependOn:
      - peering
      - httpguard
      - yacymodel
      - yacyproto
  bootstrap:
    mayDependOn:
      - bootstrap
      - yacymodel
      - yacyproto
  landing:
    mayDependOn:
      - landing
  crawling:
    mayDependOn:
      - crawling
      - httpguard
      - yacymodel
      - yacyproto
  urlmeta:
    mayDependOn:
      - urlmeta
      - boltvault
      - httpguard
      - yacymodel
      - yacyproto
  rwi:
    mayDependOn:
      - rwi
      - urlmeta
      - boltvault
      - httpguard
      - yacymodel
      - yacyproto
  search:
    mayDependOn:
      - search
      - rwi
      - urlmeta
      - httpguard
      - yacymodel
      - yacyproto
  nodestatus:
    mayDependOn:
      - nodestatus
      - httpguard
      - yacymodel
      - yacyproto
  eviction:
    mayDependOn:
      - eviction
      - rwi
      - urlmeta
      - boltvault
      - yacymodel
  cmd:
    mayDependOn:
      - boltvault
      - httpguard
      - peering
      - bootstrap
      - landing
      - crawling
      - urlmeta
      - rwi
      - search
      - eviction
      - nodestatus
      - yacymodel
      - yacyproto
  yacycrawlcontract:
    mayDependOn:
      - yacycrawlcontract
      - yacymodel
  yacycrawler:
    mayDependOn:
      - yacycrawler
      - yacycrawlcontract
      - yacymodel
    canUse:
      - xnet-html
      - robotstxt
      - xtime-rate
      - trafilatura
      - chromedp
      - go-shiori-dom
      - google-uuid
      - nats
      - nats-server

excludeFiles:
  - "yacynode/test/e2e"
