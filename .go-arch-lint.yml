version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  yacymodel:
    in: yacymodel/**
  yacyproto:
    in: yacyproto/**
  boltvault:
    in: yacynode/internal/boltvault/**
  httpguard:
    in: yacynode/internal/httpguard/**
  nodeidentity:
    in: yacynode/internal/nodeidentity/**
  peering:
    in: yacynode/internal/peering/**
  bootstrap:
    in: yacynode/internal/bootstrap/**
  landing:
    in: yacynode/internal/landing/**
  crawling:
    in: yacynode/internal/crawling/**
  urlmeta:
    in: yacynode/internal/urlmeta/**
  urlmetastaleness:
    in: yacynode/internal/urlmetastaleness/**
  rwi:
    in: yacynode/internal/rwi/**
  documentsearch:
    in: yacynode/internal/documentsearch/**
  nodestatus:
    in: yacynode/internal/nodestatus/**
  eviction:
    in: yacynode/internal/eviction/**
  metrics:
    in: yacynode/internal/metrics/**
  cmd:
    in:
      - yacynode/cmd/yacy-peer-hash/**
      - yacynode/cmd/yacy-rwi-node/**
  dbmigrate:
    in: yacynode/cmd/yacy-db-migrate/**
  yacycrawlcontract:
    in: yacycrawlcontract/**
  yacycrawler:
    in: yacycrawler/**

vendors:
  bbolt:
    in: go.etcd.io/bbolt
  prometheus:
    in:
      - github.com/prometheus/client_golang/prometheus
      - github.com/prometheus/client_golang/prometheus/**
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  xtime-rate:
    in: golang.org/x/time/rate
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp
  go-shiori-dom:
    in: github.com/go-shiori/dom
  google-uuid:
    in: github.com/google/uuid
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  yacymodel:
    mayDependOn:
      - yacymodel
  yacyproto:
    mayDependOn:
      - yacyproto
      - yacymodel
  boltvault:
    deepScan: false
    mayDependOn:
      - boltvault
    canUse:
      - bbolt
  httpguard:
    mayDependOn:
      - httpguard
      - yacymodel
      - yacyproto
  nodeidentity:
    mayDependOn:
      - yacymodel
      - yacyproto
  peering:
    mayDependOn:
      - peering
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  bootstrap:
    mayDependOn:
      - bootstrap
      - yacymodel
      - yacyproto
  landing:
    mayDependOn:
      - landing
  crawling:
    mayDependOn:
      - crawling
      - httpguard
      - yacymodel
      - yacyproto
  urlmeta:
    mayDependOn:
      - urlmeta
      - boltvault
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  urlmetastaleness:
    mayDependOn:
      - urlmetastaleness
      - boltvault
      - yacymodel
  rwi:
    mayDependOn:
      - rwi
      - urlmeta
      - boltvault
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  documentsearch:
    mayDependOn:
      - documentsearch
      - rwi
      - urlmeta
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  nodestatus:
    mayDependOn:
      - nodestatus
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  eviction:
    mayDependOn:
      - eviction
      - rwi
      - urlmeta
      - boltvault
      - yacymodel
  metrics:
    mayDependOn:
      - metrics
      - eviction
    canUse:
      - prometheus
  cmd:
    mayDependOn:
      - boltvault
      - httpguard
      - peering
      - bootstrap
      - landing
      - crawling
      - urlmeta
      - rwi
      - documentsearch
      - eviction
      - metrics
      - nodeidentity
      - nodestatus
      - urlmetastaleness
      - yacymodel
      - yacyproto
    canUse:
      - prometheus
  dbmigrate:
    mayDependOn:
      - yacymodel
    canUse:
      - bbolt
  yacycrawlcontract:
    mayDependOn:
      - yacycrawlcontract
      - yacymodel
  yacycrawler:
    mayDependOn:
      - yacycrawler
      - yacycrawlcontract
      - yacymodel
    canUse:
      - xnet-html
      - robotstxt
      - xtime-rate
      - trafilatura
      - chromedp
      - go-shiori-dom
      - google-uuid
      - nats
      - nats-server

excludeFiles:
  - "yacynode/test/e2e"
  - "yacycrawler/test/e2e"
