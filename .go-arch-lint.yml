version: 3
workdir: .

exclude:
  - .toolchain

allow:
  depOnAnyVendor: false
  deepScan: false

components:
  yacymodel:
    in: yacymodel/**
  yacyproto:
    in: yacyproto/**
  vault:
    in: yacynode/internal/vault/**
  boltvault:
    in: yacynode/internal/boltvault/**
  memvault:
    in: yacynode/internal/memvault/**
  vaulttest:
    in: yacynode/internal/vaulttest/**
  httpguard:
    in: yacynode/internal/httpguard/**
  nodeidentity:
    in: yacynode/internal/nodeidentity/**
  peering:
    in: yacynode/internal/peering/**
  bootstrap:
    in: yacynode/internal/bootstrap/**
  landing:
    in: yacynode/internal/landing/**
  crawling:
    in: yacynode/internal/crawling/**
  urlmeta:
    in: yacynode/internal/urlmeta/**
  urlmetastaleness:
    in: yacynode/internal/urlmetastaleness/**
  urlreferences:
    in: yacynode/internal/urlreferences/**
  rwi:
    in: yacynode/internal/rwi/**
  documentsearch:
    in: yacynode/internal/documentsearch/**
  nodestatus:
    in: yacynode/internal/nodestatus/**
  eviction:
    in: yacynode/internal/eviction/**
  metrics:
    in: yacynode/internal/metrics/**
  crawldispatch:
    in: yacynode/internal/crawldispatch/**
  crawlresults:
    in: yacynode/internal/crawlresults/**
  crawlbroker:
    in: yacynode/internal/crawlbroker/**
  cmd:
    in:
      - yacynode/cmd/yacy-peer-hash/**
      - yacynode/cmd/yacy-rwi-node/**
  dbmigrate:
    in: yacynode/cmd/yacy-db-migrate/**
  yacycrawlcontract:
    in: yacycrawlcontract/**
  crawlwork:
    in: yacycrawler/internal/crawlwork/**
  boundedqueue:
    in: yacycrawler/internal/boundedqueue/**
  pagefetch:
    in: yacycrawler/internal/pagefetch/**
  chromedpfetch:
    in: yacycrawler/internal/chromedpfetch/**
  botwall:
    in: yacycrawler/internal/botwall/**
  politeness:
    in: yacycrawler/internal/politeness/**
  crawlorder:
    in: yacycrawler/internal/crawlorder/**
  crawlscope:
    in: yacycrawler/internal/crawlscope/**
  frontier:
    in: yacycrawler/internal/frontier/**
  pageparse:
    in: yacycrawler/internal/pageparse/**
  pageindex:
    in: yacycrawler/internal/pageindex/**
  ingest:
    in: yacycrawler/internal/ingest/**
  pipeline:
    in: yacycrawler/internal/pipeline/**
  crawlercmd:
    in: yacycrawler/cmd/yacycrawler/**

vendors:
  bbolt:
    in: go.etcd.io/bbolt
  prometheus:
    in:
      - github.com/prometheus/client_golang/prometheus
      - github.com/prometheus/client_golang/prometheus/**
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  xtime-rate:
    in: golang.org/x/time/rate
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp
  go-shiori-dom:
    in: github.com/go-shiori/dom
  google-uuid:
    in: github.com/google/uuid
  nats:
    in:
      - github.com/nats-io/nats.go
      - github.com/nats-io/nats.go/**
  nats-server:
    in:
      - github.com/nats-io/nats-server/v2/server

deps:
  yacymodel:
    mayDependOn:
      - yacymodel
  yacyproto:
    mayDependOn:
      - yacyproto
      - yacymodel
  vault:
    mayDependOn:
      - vault
      - vaulttest
  boltvault:
    deepScan: false
    mayDependOn:
      - boltvault
      - vault
      - vaulttest
    canUse:
      - bbolt
  memvault:
    mayDependOn:
      - memvault
      - vault
      - vaulttest
  vaulttest:
    mayDependOn:
      - vaulttest
      - vault
  httpguard:
    mayDependOn:
      - httpguard
      - yacymodel
      - yacyproto
  nodeidentity:
    mayDependOn:
      - yacymodel
      - yacyproto
  peering:
    mayDependOn:
      - peering
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  bootstrap:
    mayDependOn:
      - bootstrap
      - yacymodel
      - yacyproto
  landing:
    mayDependOn:
      - landing
  crawling:
    mayDependOn:
      - crawling
      - httpguard
      - yacymodel
      - yacyproto
  urlmeta:
    mayDependOn:
      - urlmeta
      - vault
      - memvault
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  urlmetastaleness:
    mayDependOn:
      - urlmetastaleness
      - urlmeta
      - vault
      - memvault
      - yacymodel
  urlreferences:
    mayDependOn:
      - urlreferences
      - rwi
      - vault
      - memvault
      - yacymodel
  rwi:
    mayDependOn:
      - rwi
      - urlmeta
      - vault
      - memvault
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  documentsearch:
    mayDependOn:
      - documentsearch
      - rwi
      - urlmeta
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  nodestatus:
    mayDependOn:
      - nodestatus
      - httpguard
      - nodeidentity
      - yacymodel
      - yacyproto
  eviction:
    mayDependOn:
      - eviction
      - rwi
      - urlmeta
      - urlmetastaleness
      - urlreferences
      - vault
      - memvault
      - yacymodel
  metrics:
    mayDependOn:
      - metrics
      - eviction
    canUse:
      - prometheus
  cmd:
    mayDependOn:
      - vault
      - boltvault
      - memvault
      - httpguard
      - peering
      - bootstrap
      - landing
      - crawling
      - urlmeta
      - rwi
      - documentsearch
      - eviction
      - metrics
      - nodeidentity
      - nodestatus
      - urlmetastaleness
      - urlreferences
      - crawldispatch
      - crawlresults
      - crawlbroker
      - yacycrawlcontract
      - yacymodel
      - yacyproto
    canUse:
      - prometheus
      - nats-server
  dbmigrate:
    mayDependOn:
      - yacymodel
    canUse:
      - bbolt
  crawldispatch:
    mayDependOn:
      - crawldispatch
      - yacycrawlcontract
      - yacymodel
  crawlresults:
    mayDependOn:
      - crawlresults
      - urlmeta
      - rwi
      - yacycrawlcontract
      - yacymodel
  crawlbroker:
    mayDependOn:
      - crawlbroker
      - crawlresults
      - yacycrawlcontract
      - yacymodel
    canUse:
      - nats
      - nats-server
  yacycrawlcontract:
    mayDependOn:
      - yacycrawlcontract
      - yacymodel
    canUse:
      - nats
      - nats-server
  crawlwork:
    mayDependOn:
      - crawlwork
      - yacycrawlcontract
    canUse:
      - google-uuid
  boundedqueue:
    mayDependOn:
      - boundedqueue
  pagefetch:
    mayDependOn:
      - pagefetch
  chromedpfetch:
    mayDependOn:
      - pagefetch
    canUse:
      - chromedp
  botwall:
    mayDependOn:
      - botwall
      - pagefetch
  politeness:
    mayDependOn:
      - politeness
      - pagefetch
    canUse:
      - robotstxt
      - xtime-rate
  crawlscope:
    mayDependOn:
      - crawlscope
      - yacycrawlcontract
  frontier:
    mayDependOn:
      - frontier
      - crawlscope
      - crawlwork
      - yacycrawlcontract
    canUse:
      - google-uuid
  pageparse:
    mayDependOn:
      - pageparse
      - crawlwork
    canUse:
      - xnet-html
      - trafilatura
      - go-shiori-dom
  pageindex:
    mayDependOn:
      - pageindex
      - pageparse
      - crawlwork
      - yacymodel
  ingest:
    mayDependOn:
      - ingest
      - boundedqueue
      - yacycrawlcontract
      - yacymodel
    canUse:
      - nats
      - nats-server
  crawlorder:
    mayDependOn:
      - crawlorder
      - boundedqueue
      - crawlscope
      - crawlwork
      - frontier
      - yacycrawlcontract
    canUse:
      - nats
      - nats-server
  pipeline:
    mayDependOn:
      - pipeline
      - botwall
      - crawlwork
      - ingest
      - pagefetch
      - pageindex
      - pageparse
      - yacymodel
  crawlercmd:
    mayDependOn:
      - botwall
      - chromedpfetch
      - crawlorder
      - frontier
      - ingest
      - pagefetch
      - pageindex
      - pipeline
      - politeness
      - yacycrawlcontract
    canUse:
      - nats
      - nats-server

excludeFiles:
  - "yacynode/test/e2e"
  - "yacycrawler/test/e2e"
