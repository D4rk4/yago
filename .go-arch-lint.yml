version: 3
workdir: .

allow:
  depOnAnyVendor: false

components:
  yacymodel:
    in: yacymodel/**
  yacyproto:
    in: yacyproto/**
  api:
    in: internal/api/**
  core:
    in: internal/core/**
  infrastructure:
    in: internal/infrastructure/**
  cmd:
    in: cmd/**
  yacycrawler:
    in: yacycrawler/**

vendors:
  bbolt:
    in: go.etcd.io/bbolt
  xnet-html:
    in:
      - golang.org/x/net/html
      - golang.org/x/net/html/**
  robotstxt:
    in: github.com/temoto/robotstxt
  xtime-rate:
    in: golang.org/x/time/rate
  trafilatura:
    in: github.com/markusmobius/go-trafilatura
  chromedp:
    in: github.com/chromedp/chromedp

deps:
  yacymodel:
    mayDependOn:
      - yacymodel
  yacyproto:
    mayDependOn:
      - yacyproto
      - yacymodel
  core:
    deepScan: false
    mayDependOn:
      - core
      - yacymodel
  api:
    mayDependOn:
      - api
      - core
      - yacymodel
      - yacyproto
  infrastructure:
    mayDependOn:
      - infrastructure
      - core
      - yacymodel
      - yacyproto
    canUse:
      - bbolt
  cmd:
    mayDependOn:
      - api
      - core
      - infrastructure
      - yacymodel
      - yacyproto
  yacycrawler:
    mayDependOn:
      - yacycrawler
      - yacymodel
    canUse:
      - xnet-html
      - robotstxt
      - xtime-rate
      - trafilatura
      - chromedp

excludeFiles:
  - "test/e2e"
