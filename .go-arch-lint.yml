version: 3
workdir: .

allow:
  depOnAnyVendor: false

exclude:
  - yacymodel
  - yacyproto

vendors:
  yacymodel:
    in: github.com/nikitakarpei/yacy-rwi-node/yacymodel/**
  yacyproto:
    in: github.com/nikitakarpei/yacy-rwi-node/yacyproto/**

components:
  api:
    in: internal/api/**
  core:
    in: internal/core/**
  infrastructure:
    in: internal/infrastructure/**
  cmd:
    in: cmd/**

deps:
  core:
    canUse:
      - yacymodel
  api:
    mayDependOn:
      - core
    canUse:
      - yacymodel
      - yacyproto
  infrastructure:
    mayDependOn:
      - core
    canUse:
      - yacymodel
      - yacyproto
  cmd:
    mayDependOn:
      - api
      - core
      - infrastructure
    canUse:
      - yacymodel
      - yacyproto
