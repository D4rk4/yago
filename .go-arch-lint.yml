version: 3
workdir: .

allow:
  depOnAnyVendor: false

components:
  yacymodel:
    in: yacymodel/**
  yacyproto:
    in: yacyproto/**
  api:
    in: internal/api/**
  core:
    in: internal/core/**
  infrastructure:
    in: internal/infrastructure/**
  cmd:
    in: cmd/**

vendors:
  bbolt:
    in: go.etcd.io/bbolt

deps:
  yacymodel:
    mayDependOn:
      - yacymodel
  yacyproto:
    mayDependOn:
      - yacyproto
      - yacymodel
  core:
    deepScan: false
    mayDependOn:
      - core
      - yacymodel
  api:
    mayDependOn:
      - api
      - core
      - yacymodel
      - yacyproto
  infrastructure:
    mayDependOn:
      - infrastructure
      - core
      - yacymodel
      - yacyproto
    canUse:
      - bbolt
  cmd:
    mayDependOn:
      - api
      - core
      - infrastructure
      - yacymodel
      - yacyproto
